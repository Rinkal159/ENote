<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- custom css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

</head>

<body>
    <!-- green-400, orange-600 -->
    <header class="navbar px-4 py-4 border-b bg-orange-100 text-orange-600 text-2xl flex justify-between">
        <span class="border-l-4 pl-2 font-bold border-orange-700">ENote</span>
        {% if session.get("user_id") %}
        <a class="btn btn-primary rounded-2xl bg-white border-3 border-orange-500 text-black hover:border-3 hover:border-orange-700 hover:scale-105 transition duration-300"
            href="/logout">Logout</a>
        {% endif %}
    </header>

    <!-- FLASH -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{category}} text-center alert-dismissible fade show mb-0" role="alert">
        {{message}}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endfor%}
    {% endif %}
    {% endwith %}



    <div class="min-h-screen bg-orange-50">
        {% block body %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>


    <!-- <footer>
        Built by Rinkal Singapuri
    </footer> -->
</body>

</html>
