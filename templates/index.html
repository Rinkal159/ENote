{% extends "layout.html" %}

{% block body %}

    <h2 class="text-center text-3xl pt-6 text-dark font-medium">Login</h2>

    <form class="flex flex-col items-center mt-6 gap-3" action="/login" method="post">

        <!-- email -->
        <input class="rounded-2xl input px-2 py-2 bg-white border-2 border-orange-200 hover:border-orange-500 w-72" type="email" placeholder="Email" autocomplete="off" name="email">

        <!-- password -->
        <input class="rounded-2xl input px-2 py-2 bg-white border-2 border-orange-200 hover:border-orange-500 w-72" type="password" placeholder="Password" autocomplete="off" name="password">

        <!-- login button -->
        <button class="btn rounded-2xl px-6 py-2 bg-white border-3 border-orange-500 text-black hover:border-3 mt-2 hover:border-orange-700 hover:scale-105 transition duration-300" type="submit">Login</button>
    </form>

    <p class="text-center mt-4">Don't have an account?<a class="text-blue-700 underline" href="/register"> Register</a></p>

{% endblock %}
