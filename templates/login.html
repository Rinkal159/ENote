<!-- login.html - Modern ENote Login Page with Gradient Theme -->
{% extends "layout.html" %}

{% block body %}
<style>
  .login-card {
    background: rgba(255, 252, 245, 0.75);
    backdrop-filter: blur(16px);
    border-radius: 2rem;
    border: 1px solid rgba(255, 235, 200, 0.6);
    box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.15), 0 0 0 0.5px rgba(255,245,215,0.5) inset;
  }
  
  .input-modern {
    transition: all 0.25s ease;
    background: rgba(255, 255, 245, 0.9);
    border: 2px solid rgba(253, 186, 116, 0.5);
  }
  
  .input-modern:focus {
    outline: none;
    border-color: #F97316;
    box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.2);
    background: white;
    transform: scale(1.02);
  }
  
  .btn-login {
    background: linear-gradient(105deg, #F97316, #F59E0B);
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    box-shadow: 0 8px 20px -6px rgba(249, 115, 22, 0.4);
  }
  
  .btn-login:hover {
    transform: translateY(-3px);
    box-shadow: 0 18px 28px -10px rgba(249, 115, 22, 0.5);
    background: linear-gradient(105deg, #FB923C, #FBBF24);
  }
  
  .floating-light {
    animation: floatLight 9s ease-in-out infinite;
  }
  
  @keyframes floatLight {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-12px) rotate(1deg); }
  }
</style>


<!-- Main Login Container -->
<div class="relative flex flex-col items-center pt-12 login-bg min-h-screen px-6 md:px-10 lg:px-16">

  <!-- Logo -->
  <div class="absolute top-6 right-6 md:top-8 md:right-10 z-30">
    <div class="text-xl font-black tracking-tighter bg-gradient-to-r from-orange-600 to-amber-600 bg-clip-text text-transparent">ENote</div>
  </div>

  <!-- Login Card -->
  <div class="login-card w-full max-w-md p-8 md:p-10 relative z-20 transition-all duration-300 hover:shadow-xl">
        <h1 class="text-4xl text-center text-orange-600 font-extrabold pb-2 login">Login</h1>


    <form class="flex flex-col items-center mt-6 gap-3" action="/login" method="post">

        <!-- email -->
        <input class="rounded-2xl input px-2 py-2 bg-white border-2 border-orange-200 hover:border-orange-500 w-72" type="email" placeholder="Email" autocomplete="off" name="email">

        <!-- password -->
        <input class="rounded-2xl input px-2 py-2 bg-white border-2 border-orange-200 hover:border-orange-500 w-72" type="password" placeholder="Password" autocomplete="off" name="password">

        <!-- login button -->
        <button class="btn rounded-2xl px-6 py-2 bg-white border-3 border-orange-500 text-black hover:border-3 mt-2 hover:border-orange-700 hover:scale-105 transition duration-300" type="submit">Login</button>
    </form>

    

    <!-- Divider -->
    <div class="relative my-8">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-orange-200/50"></div>
      </div>
      <div class="relative flex justify-center text-xs">
        <span class="px-3 bg-transparent text-stone-400">new here?</span>
      </div>
    </div>

    <!-- Register Link -->
    <p class="text-center text-stone-600 text-sm">
      Don't have an account?
      <a class="text-orange-600 font-semibold hover:text-orange-700 transition-all hover:underline decoration-2 underline-offset-2" href="/register">
        Create free account →
      </a>
    </p>

   
  </div>

  <p class="text-center text-stone-400 text-[11px] mt-8 z-20">
    Secure login • Encrypted data • Instant access
  </p>
</div>


{% endblock %}
